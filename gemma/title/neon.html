<!DOCTYPE html>
<html lang='en' class=''>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tilt+Neon&display=swap" rel="stylesheet">
<head>

  <meta charset='UTF-8'>
  <title>CodePen Demo</title>

  <meta name="robots" content="noindex">


  <style id="INLINE_PEN_STYLESHEET_ID">
    @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

    @font-face {
      font-family: "Liberty";
      src: url("https://s3-us-west-2.amazonaws.com/s.cdpn.io/907368/liberty.otf");
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    .middle-third-wrapper {
      width: 33vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      position: absolute;
      left: 33vw;
      top: 0;
      pointer-events: none;
      text-align: center;
      padding-bottom: 2rem;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background-color: #1b243100;
      font-size: 9px;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    body .text {
      /* font-family: "Liberty"; */
      /* font-family: "Tilt Neon"; */
      font-family: "Press Start 2P", cursive;
      font-weight: 100;
      font-size: clamp(2rem, 8vw, 10rem);
      letter-spacing: .015em;
      width: 100%;
      white-space: pre;
      margin: 0 auto;
      display: table;
      opacity: 1;
      transition: opacity 5s ease;
    }

    body .text.fade-out {
      opacity: 0;
    }

    body .text .letter {
      color: #d9ffdc;
      text-shadow: 0 0 2rem #ffffff;
      display: inline-block;
      white-space: pre;
    }

    body .text .letter.letter-2 {
      transform: translate(-0.2rem, 1rem) rotate(10deg);
      -webkit-animation: flicker 2s ease-in-out infinite alternate;
      animation: flicker 2s ease-in-out infinite alternate;
    }

    @-webkit-keyframes flicker {
      0% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      5% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      5.5% {
        opacity: 0;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      6% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      6.5% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      7% {
        opacity: 0;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      8% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      50% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(13deg);
      }

      100% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }
    }

    @keyframes flicker {
      0% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      5% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      5.5% {
        opacity: 0;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      6% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      6.5% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      7% {
        opacity: 0;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      8% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }

      50% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(13deg);
      }

      100% {
        opacity: 1;
        transform: translate(-0.2rem, 1rem) rotate(10deg);
      }
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Get the text from the URL parameter or use a default
      const urlParams = new URLSearchParams(window.location.search);
      // Use \n for manual line breaks in the text
      const dynamicText = (urlParams.get('text') || 'DREADKNOT').replace(/\\n/g, '\n');
      const h1 = document.querySelector('h1.text');
      // Helper to generate a random color
      function getRandomColor() {
        // Neon-like color palette
        const neonColors = [
          '#39ff14', // neon green
          '#ff073a', // neon red
          '#00eaff', // neon blue
          '#faff00', // neon yellow
          '#ff00ea', // neon pink
          '#ff9900', // neon orange
          '#00ff99', // neon aqua
          '#fffb00', // neon lemon
          '#00fffb', // neon cyan
          '#ff00c8'  // neon magenta
        ];
        return neonColors[Math.floor(Math.random() * neonColors.length)];
      }
      if (h1) {
        h1.innerHTML = '';
        // Pick a single random color for all letters and one for the drop shadow
        const letterColor = getRandomColor();
        const shadowColor = getRandomColor();
        // Split text into lines on \n
        const lines = dynamicText.split('\n');
        lines.forEach((line, lineIdx) => {
          for (let i = 0; i < line.length; i++) {
            const span = document.createElement('span');
            span.className = 'letter letter-' + ((i % 5) + 1);
            span.textContent = line[i];
            span.style.color = letterColor;
            //span.style.textShadow = `0 0 2rem ${shadowColor}`;
            h1.appendChild(span);
          }
          if (lineIdx < lines.length - 1) {
            h1.appendChild(document.createElement('br'));
          }
        });

        // Fade the text out after 1 minute
        setTimeout(() => {
          h1.classList.add('fade-out');
        }, 60000);
      }
    });
  </script>


  <script
    src="https://cpwebassets.codepen.io/assets/common/stopExecutionOnTimeout-f07739098a39bd4e74ddd974652dac904146f33fdc1ecab356e8c809a05faccb.js"></script>

</head>

<body>
  <div class="middle-third-wrapper">
    <h1 class="text">
      <span class="letter letter-1">D</span>
      <span class="letter letter-2">R</span>
      <span class="letter letter-3">E</span>
      <span class="letter letter-4">A</span>
      <span class="letter letter-5">D</span>
      <span class="letter letter-1">K</span>
      <span class="letter letter-2">N</span>
      <span class="letter letter-3">O</span>
      <span class="letter letter-4">T</span>
    </h1>
  </div>



</body>
